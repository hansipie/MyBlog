<!doctype html>
<html lang="{{ .Site.Language.Lang | default "fr" }}" {{ if .Site.Params.themeColor }}data-theme-color="{{ .Site.Params.themeColor }}"{{ end }}>
<head>
  {{ partial "head.html" . }}
</head>
<body class="pf-body">
  <div id="root">
    <div class="pf-root">
      {{ partial "svg-icons.html" . }}
      {{ partial "nav.html" . }}
      <main class="pf-main" id="top">
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "footer.html" . }}
      {{ partial "statusbar.html" . }}
    </div>
  </div>
  <script>
    (function(){
      try{
        var s=localStorage.getItem("portfolio-rag.theme");
        var p=s==="light"||s==="dark"?s:"system";
        var t=p==="system"?(window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches?"light":"dark"):p;
        document.documentElement.setAttribute("data-theme",t);
      }catch(e){document.documentElement.setAttribute("data-theme","dark");}
    })();
  </script>
</body>
</html>
