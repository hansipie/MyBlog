baseURL = "https://blog.ansicode.fr/"
title = "ansicode"
languageCode = "fr"
defaultContentLanguage = "fr"
theme = "hansilanding"
summaryLength = 42
enableEmoji = false
enableRobotsTXT = true
disablePathToLower = false
relativeURLs = false
uglyURLs = false

[pagination]
  pagerSize = 9

[permalinks]
  categories = "/categories/:slug/"
  tags = "/tags/:slug/"

[menu]
  [[menu.main]]
    pageref = "/posts/"
    name = "Posts"
    weight = 1
  [[menu.main]]
    pageref = "/categories/"
    name = "Catégories"
    weight = 2
  [[menu.main]]
    pageref = "/tags/"
    name = "Tags"
    weight = 3
  [[menu.main]]
    pageref = "/about/"
    name = "À propos"
    weight = 4

[taxonomies]
  category = "categories"
  tag = "tags"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = true
  style = "dracula"

